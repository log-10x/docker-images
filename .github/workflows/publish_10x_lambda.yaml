name: Publish 10x Lambda container

# Builds the lambda-10x runtime image (Java/Quarkus retriever-as-Lambda,
# see ./lambda/Dockerfile) and publishes a multi-arch manifest (amd64 +
# arm64) to GHCR + Docker Hub. Modeled on publish_10x_quarkus.yaml.
#
# Image format constraints (per ./lambda/Dockerfile):
# - --provenance=false --sbom=false on buildx, otherwise Lambda rejects
#   the OCI manifest at CreateFunction time.
# - Each arch is built single-platform (linux/amd64 or linux/arm64) and
#   tagged with an arch suffix; a follow-up manifest job joins them into
#   the version-only tag that consumers reference.
#
# Pre-requisite: the matching engine release must include the
# tenx-lambda-<version>.tar.gz artifact (produced by engine's
# lambda_build.yaml).

on:
  workflow_dispatch:
    inputs:
      release_version:
        required: true
        description: '10x version to publish (must match an existing engine release with the lambda artifact)'
        type: string
      docker_hub:
        required: true
        description: 'Which registry to publish to'
        type: choice
        options:
          - All
          - GHCR
          - DockerHub

  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      docker_hub:
        required: true
        type: string

jobs:
  prepare:
    name: Checks parameters and sets vars
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}
      version_tag: ${{ steps.vars.outputs.version_tag }}
      docker_file: ${{ steps.vars.outputs.docker_file }}
      docker_context: ${{ steps.vars.outputs.docker_context }}
      docker_repo: ${{ steps.vars.outputs.docker_repo }}
      dockerhub_repo: ${{ steps.vars.outputs.dockerhub_repo }}
      docker_images: ${{ steps.vars.outputs.docker_images }}
    steps:
      - name: Check parameters
        uses: actions/github-script@v8
        with:
          script: |
            const validHubs = ["GHCR", "DockerHub", "All"];
            if (!validHubs.includes("${{ inputs.docker_hub }}")) {
              core.setFailed("docker_hub must be one of: GHCR, DockerHub, All")
            }

      - name: Prepare variables
        id: vars
        run: |
          echo "image_name=lambda-10x" >> "$GITHUB_OUTPUT"
          echo "docker_file=./main/lambda/Dockerfile" >> "$GITHUB_OUTPUT"
          echo "docker_context=./main/lambda" >> "$GITHUB_OUTPUT"
          echo "version_tag=${{ inputs.release_version }}" >> "$GITHUB_OUTPUT"
          echo "docker_repo=${{ vars.GHCR_REPO_NAME }}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_repo=docker.io/${{ vars.DOCKERHUB_REPO_NAME }}" >> "$GITHUB_OUTPUT"

          IMAGES=""
          if [ "${{ inputs.docker_hub }}" == "GHCR" ] || [ "${{ inputs.docker_hub }}" == "All" ]; then
            IMAGES="${{ vars.GHCR_REPO_NAME }}/lambda-10x"
          fi
          if [ "${{ inputs.docker_hub }}" == "DockerHub" ] || [ "${{ inputs.docker_hub }}" == "All" ]; then
            if [ -n "$IMAGES" ]; then
              IMAGES=$(printf '%s\n%s' "$IMAGES" "docker.io/${{ vars.DOCKERHUB_REPO_NAME }}/lambda-10x")
            else
              IMAGES="docker.io/${{ vars.DOCKERHUB_REPO_NAME }}/lambda-10x"
            fi
          fi
          {
            echo 'docker_images<<EOF'
            echo "$IMAGES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  publish_x86:
    name: "Build x86 Lambda ${{needs.prepare.outputs.version_tag}}"
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: prepare

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          path: main

      # gh CLI requires a token, but built-in GITHUB_TOKEN works for public repos
      - name: Prepare release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ inputs.release_version }} --pattern "tenx-lambda-*.tar.gz" -R https://github.com/${{ vars.RELEASE_REPO }}
          ls -la
          # Tarball contents (per engine/.github/workflows/lambda_build.yaml):
          #   run-lambda-<version>-all.jar  →  consumed by Dockerfile COPY
          #   log4j2.yaml                   →  consumed by Dockerfile COPY
          #   LICENSE                       →  bundled into image context
          tar -xzvf tenx-lambda-*.tar.gz -C ./main/lambda/

      - name: Login to GHCR
        if: ${{ inputs.docker_hub == 'GHCR' || inputs.docker_hub == 'All' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ inputs.docker_hub == 'DockerHub' || inputs.docker_hub == 'All' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: docker-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{needs.prepare.outputs.docker_images}}
          tags: |
            type=raw,value=${{needs.prepare.outputs.version_tag}}-amd64
            type=raw,value=latest-amd64,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish container
        uses: docker/build-push-action@v7
        with:
          file: ${{needs.prepare.outputs.docker_file}}
          context: ${{needs.prepare.outputs.docker_context}}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.docker-meta.outputs.tags }}
          build-args: |
            ENGINE_VERSION=${{ inputs.release_version }}

  publish_aarch64:
    name: "Build aarch64 Lambda ${{needs.prepare.outputs.version_tag}}"
    runs-on: linux-arm64-2core
    timeout-minutes: 12
    needs: prepare

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          path: main

      - name: Prepare release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ inputs.release_version }} --pattern "tenx-lambda-*.tar.gz" -R https://github.com/${{ vars.RELEASE_REPO }}
          ls -la
          tar -xzvf tenx-lambda-*.tar.gz -C ./main/lambda/

      - name: Login to GHCR
        if: ${{ inputs.docker_hub == 'GHCR' || inputs.docker_hub == 'All' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ inputs.docker_hub == 'DockerHub' || inputs.docker_hub == 'All' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: docker-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{needs.prepare.outputs.docker_images}}
          tags: |
            type=raw,value=${{needs.prepare.outputs.version_tag}}-aarch64
            type=raw,value=latest-aarch64,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish container
        uses: docker/build-push-action@v7
        with:
          file: ${{needs.prepare.outputs.docker_file}}
          context: ${{needs.prepare.outputs.docker_context}}
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.docker-meta.outputs.tags }}
          build-args: |
            ENGINE_VERSION=${{ inputs.release_version }}

  publish_version_manifest:
    name: Publish multiarch manifest for ${{needs.prepare.outputs.version_tag}}
    needs:
      - prepare
      - publish_x86
      - publish_aarch64
    uses: ./.github/workflows/update_multiarch_manifest.yaml
    with:
      version_tag: ${{needs.prepare.outputs.version_tag}}
      docker_hub: ${{ inputs.docker_hub }}
      docker_repo: ${{needs.prepare.outputs.docker_repo}}
      image_name: ${{needs.prepare.outputs.image_name}}
      dockerhub_repo: ${{needs.prepare.outputs.dockerhub_repo}}
    secrets: inherit
